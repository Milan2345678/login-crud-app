<!DOCTYPE html>
<html>

<head>
  <title>Login - RBAC System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input {
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
    }

    button {
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    .link-section {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .link-section a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
    }

    .link-section a:hover {
      text-decoration: underline;
    }

    .demo-info {
      background: #f0f4ff;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🔐 Login</h1>

    <div class="demo-info">
      <strong>Demo Accounts:</strong><br>
      Admin: username: <code>admin</code> | password: <code>admin123</code><br>
      User: username: <code>user</code> | password: <code>user1234</code>
    </div>

    <form id="loginForm">
      <input type="text" id="loginUsername" placeholder="Username" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="link-section">
      <p>Don't have an account?</p>
      <a href="register.html">Register here</a>
    </div>
  </div>

  <script src="script.js"></script>

</body>

</html>
